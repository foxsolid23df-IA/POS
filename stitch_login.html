<html class="dark"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0da6f2",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101c22",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .bg-mesh {
            background-color: #101c22;
            background-image: 
                radial-gradient(at 0% 0%, rgba(13, 166, 242, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(217, 70, 239, 0.1) 0px, transparent 50%);
        }
        .inner-shadow-input {
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center p-6 bg-mesh">
<div class="w-full max-w-[400px] flex flex-col items-center">
<div class="mb-12 relative">
<div class="absolute -inset-4 bg-primary/20 blur-3xl rounded-full"></div>
<div class="relative w-24 h-24 flex items-center justify-center bg-background-dark/40 rounded-2xl glass-card">
<span class="material-symbols-outlined text-5xl text-primary" style="font-variation-settings: 'FILL' 1, 'wght' 200">
                    monitoring
                </span>
</div>
<div class="mt-6 text-center">
<h2 class="text-sm font-bold tracking-[0.2em] uppercase text-primary/80">Nexus Core</h2>
</div>
</div>
<div class="glass-card w-full rounded-xl p-8 flex flex-col gap-6">
<div class="text-center mb-2">
<h1 class="text-3xl font-bold tracking-tight text-slate-100">Bienvenido</h1>
<p class="text-slate-400 text-sm mt-2">Accede a tu panel profesional</p>
</div>
<div class="space-y-4">
<div class="flex flex-col gap-2">
<label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl group-focus-within:text-primary">
                            mail
                        </span>
<input class="w-full bg-slate-900/50 border border-slate-700/50 rounded-lg py-4 pl-12 pr-4 text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-1 focus:ring-primary/50 focus:border-primary/50 transition-all inner-shadow-input" placeholder="nombre@empresa.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl group-focus-within:text-primary">
                            lock
                        </span>
<input class="w-full bg-slate-900/50 border border-slate-700/50 rounded-lg py-4 pl-12 pr-12 text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-1 focus:ring-primary/50 focus:border-primary/50 transition-all inner-shadow-input" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl cursor-pointer hover:text-slate-300">
                            visibility
                        </span>
</div>
</div>
</div>
<div class="flex justify-end">
<a class="text-xs text-primary/80 hover:text-primary font-medium" href="#">¿Olvidaste tu contraseña?</a>
</div>
<button class="w-full py-4 rounded-lg font-bold text-white shadow-lg shadow-primary/20 bg-gradient-to-r from-primary to-fuchsia-500 hover:opacity-90 active:scale-[0.98] transition-all">
                INICIAR SESIÓN
            </button>
<div class="relative py-4">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-700/50"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-transparent px-2 text-slate-500">O continuar con</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-lg bg-slate-800/40 border border-slate-700/50 hover:bg-slate-800/60 transition-colors">

<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="currentColor"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="currentColor"></path>
</svg>
<span class="text-sm font-medium text-slate-300">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-lg bg-slate-800/40 border border-slate-700/50 hover:bg-slate-800/60 transition-colors">
<svg class="w-5 h-5 grayscale opacity-70" viewbox="0 0 23 23">
<path d="M0 0h11v11H0zM12 0h11v11H12zM0 12h11v11H0zM12 12h11v11H12z" fill="currentColor"></path>
</svg>
<span class="text-sm font-medium text-slate-300">Microsoft</span>
</button>
</div>
</div>
<div class="mt-8 text-center">
<p class="text-slate-500 text-sm">¿No tienes una cuenta? <a class="text-primary font-semibold" href="#">Regístrate</a></p>
</div>
</div>
<div class="fixed bottom-6 flex gap-4 text-[10px] uppercase tracking-widest text-slate-600 font-bold">
<a class="hover:text-primary transition-colors" href="#">Privacidad</a>
<span>•</span>
<a class="hover:text-primary transition-colors" href="#">Términos</a>
<span>•</span>
<a class="hover:text-primary transition-colors" href="#">Soporte</a>
</div>
</body></html>
