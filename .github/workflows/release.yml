name: Release Windows Installer

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL || 'https://qqvjhitxehlqyvawnept.supabase.co' }}
      VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFxdmpoaXR4ZWhscXl2YXduZXB0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg2MDczNDksImV4cCI6MjA4NDE4MzM0OX0.fqzRsPb883Bn9Ob1ktZziyZtA4MUcTgtfaon6VoszqA' }}
      VITE_APP_MODE: pos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify release tag matches app version
        shell: powershell
        run: |
          $tag = "${{ github.ref_name }}"
          $version = (Get-Content package.json | ConvertFrom-Json).version
          if ($tag -ne "v$version") {
            Write-Error "El tag $tag no coincide con la version raiz v$version. Actualiza package.json antes de publicar."
            exit 1
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --omit=dev
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Prepare portable Node.js
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          $nodePath = (Get-Command node).Source
          Copy-Item -Path $nodePath -Destination bin\node.exe -Force

      - name: Prepare backend env
        shell: powershell
        env:
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          function New-HexSecret([int]$bytes) {
            $buffer = New-Object byte[] $bytes
            $rng = [System.Security.Cryptography.RandomNumberGenerator]::Create()
            try {
              $rng.GetBytes($buffer)
              return ($buffer | ForEach-Object { $_.ToString("x2") }) -join ""
            }
            finally {
              $rng.Dispose()
            }
          }

          $envContent = $env:BACKEND_ENV
          if ([string]::IsNullOrWhiteSpace($envContent)) {
            $jwtSecret = New-HexSecret 64
            $masterPin = New-HexSecret 16
            $envContent = @(
              "PORT=3001",
              "HOST=127.0.0.1",
              "NODE_ENV=production",
              "FRONTEND_URL=http://localhost:3001,http://localhost:5173",
              "JWT_SECRET=$jwtSecret",
              "MASTER_PIN=$masterPin"
            ) -join "`n"
          }

          if ($envContent -notmatch "(?m)^JWT_SECRET=") {
            $envContent += "`nJWT_SECRET=$(New-HexSecret 64)"
          }
          if ($envContent -notmatch "(?m)^MASTER_PIN=") {
            $envContent += "`nMASTER_PIN=$(New-HexSecret 16)"
          }

          Set-Content -Path build\.env -Value $envContent -Encoding UTF8

      - name: Build app
        run: npm run build:all

      - name: Publish Windows release
        run: npx electron-builder --win --x64 --publish always

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexum-pos-windows-release
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          if-no-files-found: error
